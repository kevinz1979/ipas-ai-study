<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f3d5e">
  <meta name="description" content="iPAS AI 應用規劃師初級與中級備考網站，中級選擇機器學習技術與應用。">
  <title>iPAS AI 應用規劃師｜初級＋中級備考站</title>

  <style>
    :root {
      --navy: #0f3d5e;
      --blue: #176b87;
      --blue-dark: #0d536d;
      --sky: #e8f4f8;
      --gold: #f3b33d;
      --ink: #17212b;
      --muted: #52616b;
      --line: #d7e2e8;
      --surface: #ffffff;
      --background: #f4f8fa;
      --danger-bg: #fff8e8;
      --success: #217a50;
      --content-width: 1080px;
      --radius: 16px;
      --shadow: 0 4px 18px rgba(15, 61, 94, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 85px;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont,
        "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 16px;
      line-height: 1.75;
    }

    a {
      color: var(--blue-dark);
    }

    a:focus-visible,
    button:focus-visible,
    summary:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 3px;
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: var(--content-width);
      min-height: 64px;
      margin: 0 auto;
      padding: 8px 16px;
    }

    .brand {
      flex: 0 0 auto;
      color: var(--navy);
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .nav-links a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 10px;
      color: var(--navy);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    .nav-links a:hover {
      background: var(--sky);
    }

    .nav-links a[aria-current="page"] {
      background: var(--navy);
      color: #ffffff;
    }

    .hero {
      padding: 48px 20px 40px;
      background: linear-gradient(135deg, var(--navy), var(--blue));
      color: #ffffff;
    }

    .hero-inner,
    main {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .hero h1 {
      max-width: 800px;
      margin: 0 0 10px;
      font-size: clamp(31px, 6vw, 48px);
      line-height: 1.22;
    }

    .hero p {
      max-width: 760px;
      margin: 0;
      font-size: 17px;
      opacity: 0.96;
    }
