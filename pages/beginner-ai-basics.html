<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f3d5e">
  <meta name="description" content="iPAS AI 應用規劃師初級科目一：人工智慧基礎概論備考頁面。">
  <title>初級 AI 基礎概論｜iPAS AI 應用規劃師</title>

  <style>
    :root {
      --navy: #0f3d5e;
      --blue: #176b87;
      --blue-dark: #0d536d;
      --sky: #e8f4f8;
      --gold: #f3b33d;
      --ink: #17212b;
      --muted: #52616b;
      --line: #d7e2e8;
      --surface: #ffffff;
      --background: #f4f8fa;
      --notice: #fff8e8;
      --content-width: 1080px;
      --radius: 16px;
      --shadow: 0 4px 18px rgba(15, 61, 94, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 86px;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont,
        "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 16px;
      line-height: 1.75;
    }

    a {
      color: var(--blue-dark);
    }

    a:focus-visible,
    button:focus-visible,
    summary:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 3px;
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: var(--content-width);
      min-height: 64px;
      margin: 0 auto;
      padding: 8px 16px;
    }

    .brand {
      flex: 0 0 auto;
      color: var(--navy);
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .nav-links a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 8px 12px;
      border-radius: 10px;
      color: var(--navy);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    .nav-links a:hover {
      background: var(--sky);
    }

    .nav-links a[aria-current="page"] {
      background: var(--navy);
      color: #ffffff;
    }

    .hero {
      padding: 46px 20px 38px;
      background: linear-gradient(135deg, var(--navy), var(--blue));
      color: #ffffff;
    }

    .hero-inner,
    main {
      max-width: var(--content-width);
      margin: 0 auto;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1.22;
    }

    .hero p {
      max-width: 780px;
      margin: 0;
      font-size: 17px;
      opacity: 0.96;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .tag {
      padding: 5px 12px;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 14px;
      font-weight: 700;
    }

    .section-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-top: 22px;
      padding: 4px 0;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .section-nav a {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .section-nav a:hover {
      background: #ffffff;
      color: var(--navy);
    }

    main {
      padding: 26px 16px 56px;
    }

    section {
      margin-top: 38px;
      scroll-margin-top: 86px;
    }

    h2 {
      margin: 0 0 14px;
      color: var(--navy);
      font-size: clamp(24px, 4vw, 30px);
      line-height: 1.35;
    }

    h3 {
      margin: 0 0 8px;
      color: var(--blue-dark);
      font-size: 19px;
      line-height: 1.4;
    }

    p {
      margin: 0 0 12px;
    }

    ul,
    ol {
      margin: 8px 0;
      padding-left: 22px;
    }

    .notice {
      padding: 15px 16px;
      border-left: 5px solid var(--gold);
      border-radius: 10px;
      background: var(--notice);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
      gap: 16px;
    }

    .card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .card p:last-child {
      margin-bottom: 0;
    }

    .flow {
      overflow: hidden;
      padding: 0;
    }

    .flow-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .flow-row:last-child {
      border-bottom: 0;
    }

    .flow-title {
      color: var(--blue-dark);
      font-weight: 850;
    }

    .flow-row p {
      margin: 0;
    }
